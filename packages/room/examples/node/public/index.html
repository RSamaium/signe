<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signe Node Room</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f7f9;
        color: #17191c;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .panel {
        border: 1px solid #d9dde3;
        border-radius: 8px;
        background: #ffffff;
        padding: 20px;
        display: grid;
        gap: 16px;
      }

      .count {
        font-size: 64px;
        line-height: 1;
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        min-height: 40px;
        border: 1px solid #17191c;
        border-radius: 6px;
        background: #17191c;
        color: #ffffff;
        padding: 0 14px;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: #ffffff;
        color: #17191c;
      }

      .status {
        min-height: 24px;
        color: #5b6472;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Signe Node Room</h1>
      <section class="panel">
        <div class="count" id="count">0</div>
        <div class="actions">
          <button id="increment" type="button">Increment</button>
          <button id="reset" class="secondary" type="button">Reset</button>
        </div>
        <div class="status" id="status">Connecting...</div>
      </section>
    </main>
    <script>
      const count = document.querySelector("#count");
      const status = document.querySelector("#status");
      const socket = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/parties/main/demo`);

      socket.addEventListener("open", () => {
        status.textContent = "Connected";
      });

      socket.addEventListener("close", () => {
        status.textContent = "Disconnected";
      });

      socket.addEventListener("message", (event) => {
        const packet = JSON.parse(event.data);
        if (packet.type === "sync" && packet.value && typeof packet.value.count === "number") {
          count.textContent = String(packet.value.count);
        }
      });

      document.querySelector("#increment").addEventListener("click", () => {
        socket.send(JSON.stringify({ action: "increment", value: { amount: 1 } }));
      });

      document.querySelector("#reset").addEventListener("click", async () => {
        await fetch("/parties/main/demo/reset", { method: "POST" });
      });
    </script>
  </body>
</html>
